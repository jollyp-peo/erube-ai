services:

  django:
    build:
      context: ../../
      dockerfile: infrastructure/docker/Dockerfile.django

    container_name: erube-django

    env_file:
      - ../../.envs/.env.dev

    ports:
      - "8000:8000"

    volumes:
      - ../../apps/api:/app

    depends_on:
      - postgres
      - redis

    command: python manage.py runserver 0.0.0.0:8000

  postgres:
    image: postgres:17

    container_name: erube-postgres

    env_file:
      - ../../.envs/.env.dev

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:8-alpine

    container_name: erube-redis

    ports:
      - "6379:6379"

    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data: